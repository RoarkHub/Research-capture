<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roark R&D Capture</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" href="./icon-192.png" />
  <meta name="theme-color" content="#0d1117" />
</head>
<body>
  <header>
    <h1>Capture</h1>
    <span id="queue-status" class="queue-status"></span>
  </header>

  <main>
    <form id="note-form">
      <label for="project">Project</label>
      <input id="project" type="text" placeholder="e.g. Level4-PM (optional)" />

      <label for="tags">Tags (comma separated)</label>
      <input id="tags" type="text" placeholder="e.g. structures, thermal" />

      <label for="summary">Summary</label>
      <input id="summary" type="text" placeholder="one line description (optional)" />

      <label for="body">Note</label>
      <textarea id="body" rows="10" placeholder="Write here..."></textarea>

      <button type="submit">Save</button>
      <p id="save-status" class="status"></p>
    </form>

    <details>
      <summary>Settings</summary>
      <form id="settings-form">
        <label for="gh-token">GitHub token (fine-grained — Contents: Read and write, scoped to this one repo)</label>
        <input id="gh-token" type="password" autocomplete="off" />

        <label for="gh-owner">Repo owner</label>
        <input id="gh-owner" type="text" placeholder="your GitHub username" />

        <label for="gh-repo">Repo name</label>
        <input id="gh-repo" type="text" placeholder="RoarkHub" />

        <label for="gh-path">Folder in repo</label>
        <input id="gh-path" type="text" placeholder="vault" />

        <label for="gh-branch">Branch</label>
        <input id="gh-branch" type="text" placeholder="main" />

        <button type="submit">Save Settings</button>
      </form>
    </details>
  </main>

  <script src="./app.js"></script>
</body>
</html>
